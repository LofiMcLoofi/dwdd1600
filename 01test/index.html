    <h>Digital Citizenship</h>
    <h2>What is Digital Citizenship?</h2>
    <p>Digital citizenship refers to the responsible and ethical use of technology 
        by individuals while navigating the digital world. It encompasses a set of norms, 
        behaviors, and skills that promote safety, respect, and responsibility online.</p>
